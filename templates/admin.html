<h2>Admin Panel</h2><form method="post" action="/admin/add_coins"><input name="phone" placeholder="User Phone"><input name="amount" placeholder="Coins"><button>Add Coins</button></form><h3>Users</h3><ul>{% for u in users %}<li>{{ u }} - Coins: {{ coins[u] }}</li>{% endfor %}</ul><h3>Logs</h3><ul>{% for log in logs %}<li>{{ log }}</li>{% endfor %}</ul><h3>Blocked IPs</h3><ul>{% for ip, time in ip_blocked.items() %}<li>{{ ip }} blocked till {{ time }}</li>{% endfor %}</ul>
